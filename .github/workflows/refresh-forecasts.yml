name: Weekly Forecast Refresh

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine eligibility year
        run: |
          # Oscar ceremony is in March. Films from the prior calendar year are still
          # in the race through March, so Jan-Mar we track the previous year's films.
          MONTH=$(date +%-m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -le 3 ]; then
            ELIGIBILITY_YEAR=$((YEAR - 1))
          else
            ELIGIBILITY_YEAR=$YEAR
          fi
          echo "ELIGIBILITY_YEAR=$ELIGIBILITY_YEAR" >> $GITHUB_ENV

      - name: Pull latest TMDb contenders
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/pull_future_movies.py --year $ELIGIBILITY_YEAR

      - name: Pull festival selections
        run: python src/pull_festival_selections.py --year $ELIGIBILITY_YEAR

      - name: Score future contenders
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/future_best_picture.py --year $ELIGIBILITY_YEAR

      - name: Pull TMDb actor credits
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/pull_person_credits.py --year $ELIGIBILITY_YEAR

      - name: Score Best Actor contenders
        run: python src/build_actor_contender_pool.py --year $ELIGIBILITY_YEAR

      - name: Score Best Actress contenders
        run: python src/build_actress_contender_pool.py --year $ELIGIBILITY_YEAR

      - name: Score Best Director contenders
        run: python src/build_director_contender_pool.py --year $ELIGIBILITY_YEAR

      - name: Rebuild site data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/build_site_data.py

      - name: Commit updated forecasts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/future_best_picture_predictions_*.csv output/future_actor_predictions_*.csv output/future_actor_predictions_*_prev.csv output/future_actress_predictions_*.csv output/future_actress_predictions_*_prev.csv output/future_director_predictions_*.csv output/future_director_predictions_*_prev.csv data/raw/tmdb_credits_*.csv data/raw/tmdb_movies_*.csv data/raw/manual_festival_flags.csv site/data/site_data.json site/data/site_data.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly forecast refresh"
            for i in 1 2 3; do
              git push && break
              echo "Push attempt $i failed, rebasing and retrying..."
              git stash
              git fetch origin main
              git rebase origin/main
              git stash pop || true
            done
          fi

      # Pages deploy triggers automatically via deploy-pages.yml on push to main
