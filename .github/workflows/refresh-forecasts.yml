name: Weekly Forecast Refresh

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine eligibility year
        run: |
          # Oscar ceremony is in March. Films from the prior calendar year are still
          # in the race through March, so Jan-Mar we track the previous year's films.
          MONTH=$(date +%-m)
          YEAR=$(date +%Y)
          if [ "$MONTH" -le 3 ]; then
            ELIGIBILITY_YEAR=$((YEAR - 1))
          else
            ELIGIBILITY_YEAR=$YEAR
          fi
          echo "ELIGIBILITY_YEAR=$ELIGIBILITY_YEAR" >> $GITHUB_ENV

      - name: Pull latest TMDb contenders
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/pull_future_movies.py --year ${{ env.ELIGIBILITY_YEAR }}

      - name: Score future contenders
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/future_best_picture.py --year ${{ env.ELIGIBILITY_YEAR }}

      - name: Rebuild site data
        run: python src/build_site_data.py

      - name: Commit updated forecasts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/future_best_picture_predictions_*.csv site/data/site_data.json site/data/site_data.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly forecast refresh [skip ci]"
            git push
          fi

      - name: Trigger Pages deploy
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-pages.yml',
              ref: 'main',
            });
